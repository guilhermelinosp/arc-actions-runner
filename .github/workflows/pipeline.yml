name: pipeline

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - run: |
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          echo "PR: $HEAD → $BASE"

          if [ "$HEAD" = "staging" ] && [ "$BASE" = "main" ]; then
            echo "✅ staging → main (release)"
            exit 0
          fi

          case "$HEAD" in
            feat/*) echo "✅ branch: $HEAD" ;;
            *) echo "❌ Use feat/*"; exit 1 ;;
          esac

          echo "${{ github.event.pull_request.title }}" | grep -qE '^(feat|fix|docs|style|ref|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+' \
            && echo "✅ PR title" || { echo "❌ Conventional Commits"; exit 1; }
