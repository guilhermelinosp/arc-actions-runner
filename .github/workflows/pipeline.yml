name: pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:
  buildx:
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@latest
    with:
      runner: '["ubuntu-latest"]'

  trivy:
    needs: buildx
    uses: guilhermelinosp/ci-templates/.github/workflows/trivy.yml@latest
    with:
      runner: '["ubuntu-latest"]'
      image: ${{ needs.buildx.outputs.image }}

  release:
    needs: [ buildx, trivy ]
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@latest
    with:
      runner: '["ubuntu-latest"]'
  push:
    needs: [ release, buildx ]
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@latest
    with:
      runner: '["ubuntu-latest"]'
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
