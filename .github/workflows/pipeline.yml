name: pipeline

on:
  push:
    branches: [main]

jobs:
  release:
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@main
    secrets: inherit

  buildx:
    needs: [release]
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@main
    secrets: inherit

  push:
    needs: [buildx, release]
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@main
    secrets: inherit
    with:
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
