name: pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildx:
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@main
    with:
      runner: ubuntu-latest
      registry_owner: ${{ github.repository_owner }}

  release:
    needs: buildx
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@main
    with:
      runner: ubuntu-latest

  push:
    needs: [buildx, release]
    if: github.event_name == 'push' || github.base_ref == 'main'
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@main
    with:
      runner: ubuntu-latest
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
