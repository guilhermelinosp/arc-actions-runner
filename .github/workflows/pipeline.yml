name: pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, staging]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    uses: guilhermelinosp/ci-templates/.github/workflows/branch-rules.yml@main

  buildx:
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@main
    with:
      runner: ubuntu-latest
      registry_owner: ${{ github.repository_owner }}

  trivy:
    needs: buildx
    uses: guilhermelinosp/ci-templates/.github/workflows/trivy.yml@main
    with:
      runner: ubuntu-latest
      image: ${{ needs.buildx.outputs.image }}

  release:
    needs: [buildx, trivy]
    if: github.base_ref == 'main' && github.head_ref == 'staging'
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@main
    with:
      runner: ubuntu-latest

  push:
    needs: [buildx, release]
    if: github.event_name == 'push' || (github.base_ref == 'main' && github.head_ref == 'staging')
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@main
    with:
      runner: ubuntu-latest
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
