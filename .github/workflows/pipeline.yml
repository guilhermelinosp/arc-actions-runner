name: pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildx:
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@main
    with:
      runner: self-hosted
      registry_owner: ${{ github.repository_owner }}

  minio:
    needs: buildx
    runs-on: self-hosted
    steps:
      - name: Check MinIO access
        run: |
          echo "=== Buckets ==="
          mc ls minio/
      - name: Store image info
        run: |
          DIGEST="${{ needs.buildx.outputs.image }}"
          echo "$DIGEST" | mc pipe minio/arc-runner/digest-${GITHUB_SHA::7}.txt
          echo "digest stored: arc-runner/digest-${GITHUB_SHA::7}.txt"
      - name: List stored artifacts
        run: |
          mc ls minio/arc-runner/ || true

  release:
    needs: [buildx]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@main
    with:
      runner: self-hosted

  push:
    needs: [buildx, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@main
    with:
      runner: self-hosted
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
