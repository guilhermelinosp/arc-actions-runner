name: pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    uses: guilhermelinosp/ci-templates/.github/workflows/branch-rules.yml@latest

  buildx:
    needs: validate
    if: always()
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yml@latest
    with:
      runner: ubuntu-latest
      registry_owner: ${{ github.repository_owner }}

  trivy:
    needs: buildx
    uses: guilhermelinosp/ci-templates/.github/workflows/trivy.yml@latest
    with:
      runner: ubuntu-latest
      image: ${{ needs.buildx.outputs.image }}

  release:
    needs: [buildx, trivy]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@latest
    with:
      runner: ubuntu-latest

  push:
    needs: [buildx, release]
    if: github.event_name == 'push' || github.base_ref == 'main'
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yml@latest
    with:
      runner: ubuntu-latest
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.tag }}
