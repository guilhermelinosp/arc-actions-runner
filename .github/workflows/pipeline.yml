name: pipeline

on:
  push:
    branches: [main, staging, feat/*]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - if: github.event_name == 'push'
        run: echo "❌ Push direto nao permitido" && exit 1

      - if: github.event_name == 'pull_request'
        run: |
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          case "$HEAD" in feat/*) echo "✅ branch: $HEAD" ;; *) echo "❌ Use feat/*"; exit 1 ;; esac
          echo "${{ github.event.pull_request.title }}" | grep -qE '^(feat|fix|docs|style|ref|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+' && echo "✅ PR title" || { echo "❌ Conventional Commits"; exit 1; }

  buildx:
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: docker build -t test .

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Bump version
        id: semver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then echo "tag=v1.0.1" >> $GITHUB_OUTPUT; echo "first=true" >> $GITHUB_OUTPUT; exit 0; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          MAJOR=${MAJOR:-1}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          git log --format="%s" "$LATEST..HEAD" 2>/dev/null | grep -q "BREAKING CHANGE\|!:" && { MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0; } \
            || git log --format="%s" "$LATEST..HEAD" 2>/dev/null | grep -q "^feat" && { MINOR=$((MINOR+1)); PATCH=0; } \
            || PATCH=$((PATCH+1))
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.semver.outputs.tag }}"
          [ "${{ steps.semver.outputs.first }}" = "true" ] && NOTES="" || NOTES="--notes-start-tag ${{ steps.semver.outputs.latest }}"
          gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes $NOTES

      - name: Update latest tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest && git push origin latest --force
