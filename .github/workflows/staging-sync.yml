name: staging-sync

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0, token: "${{ github.token }}" }
      - name: Sync staging with main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin staging 2>/dev/null || git checkout -b staging
          git checkout staging 2>/dev/null || git checkout -b staging
          git merge origin/main --no-edit 2>/dev/null && git push origin staging && echo "✅ staging sincronizada" || echo "⚠️ staging já está atualizada"
