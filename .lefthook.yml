min_version: "1.12.0"

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    gofmt-check:
      glob: "*.go"
      run: test -z "$(gofmt -l {staged_files})"

    vet:
      glob: "*.go"
      run: go vet ./...

    lint-yaml:
      glob: "*.{yaml,yml}"
      run: yamllint .

    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}

pre-push:
  commands:
    test:
      run: go test ./... -race

    build:
      run: go build ./...

commit-msg:
  commands:
    conventional:
      run: |
        grep -Eq '^(feat|fix|docs|refactor|test|chore|ci|build|perf|style|revert)(\(.+\))?!?: .+' {1}
